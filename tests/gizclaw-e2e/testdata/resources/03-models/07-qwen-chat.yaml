---
apiVersion: gizclaw.admin/v1alpha1
kind: Model
metadata:
  name: qwen-plus
spec:
  kind: llm
  source: manual
  provider:
    kind: dashscope-tenant
    name: qwen-dashscope-main
  name: Qwen Plus
  description: Qwen chat model through DashScope
  provider_data:
    upstream_model: qwen-plus
    api_mode: chat_completions
    support_json_output: true
    support_temperature: true
    support_text_only: true
    support_tool_calls: true
    support_thinking: false
    use_system_role: true
