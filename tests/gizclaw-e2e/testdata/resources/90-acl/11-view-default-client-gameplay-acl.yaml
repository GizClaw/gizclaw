---
apiVersion: gizclaw.admin/v1alpha1
kind: ResourceList
metadata:
  name: view-default-client-gameplay-acl
spec:
  items:
  - apiVersion: gizclaw.admin/v1alpha1
    kind: ACLPolicyBinding
    metadata:
      name: view-default-client-workflow-pet-care
    spec:
      subject:
        kind: view
        id: default-client
      resource:
        kind: workflow
        id: pet-care-flowcraft
      role: default-client
  - apiVersion: gizclaw.admin/v1alpha1
    kind: ACLPolicyBinding
    metadata:
      name: view-default-client-gameruleset-codex-pet-examples
    spec:
      subject:
        kind: view
        id: default-client
      resource:
        kind: gameruleset
        id: codex-pet-examples
      role: default-client
