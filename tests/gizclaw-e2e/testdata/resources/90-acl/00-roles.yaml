---
apiVersion: gizclaw.admin/v1alpha1
kind: ResourceList
metadata:
  name: acl-roles
spec:
  items:
  - apiVersion: gizclaw.admin/v1alpha1
    kind: ACLRole
    metadata:
      name: default-client
    spec:
      permissions:
      - read
      - use
  - apiVersion: gizclaw.admin/v1alpha1
    kind: ACLRole
    metadata:
      name: standard-client
    spec:
      permissions:
      - read
      - use
      - admin
  - apiVersion: gizclaw.admin/v1alpha1
    kind: ACLRole
    metadata:
      name: collection-creator
    spec:
      permissions:
      - create
