---
apiVersion: gizclaw.admin/v1alpha1
kind: Workflow
metadata:
  name: pet-care-flowcraft
  description: Flowcraft pet-care workflow used by gameplay e2e pets
spec:
  driver: flowcraft
  flowcraft:
    workspace:
      memory_root: memory
      state_root: state
      history_root: history
    conversation:
      starts: peer
      context_id: pet-care-flowcraft
    history:
      enabled: true
      kind: buffer
      max_messages: 20
    memory:
      enabled: true
      write:
        save_conversation: true
        mode: async_semantic
        tier: general
      extract:
        enabled: false
      embedding:
        enabled: false
      retrieval:
        backend: memory
    agent:
      id: pet-care
      name: Pet Care
      model: generate_model
      system_prompt: 你是 GizClaw 的宠物养成伙伴。用简短、自然的中文和用户聊天，记住自己是一只被领养的虚拟宠物。不要解释测试流程。
      max_iterations: 4
    settings:
      generate_model: doubao-lite-chat
