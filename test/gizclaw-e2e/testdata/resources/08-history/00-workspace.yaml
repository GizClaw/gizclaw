apiVersion: gizclaw.admin/v1alpha1
kind: ResourceList
metadata:
  name: history-workspace
spec:
  items:
  - apiVersion: gizclaw.admin/v1alpha1
    kind: Workflow
    metadata:
      description: History/replay chatroom workflow
      name: chatroom-history
    spec:
      chatroom:
        history:
          ttl: 168h
      driver: chatroom
  - apiVersion: gizclaw.admin/v1alpha1
    kind: Workspace
    metadata:
      name: workspace-history-demo
    spec:
      parameters:
        agent_type: chatroom
      workflow_name: chatroom-history
