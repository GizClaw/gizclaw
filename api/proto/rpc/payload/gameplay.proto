// Peer RPC gameplay payload protobuf schema.

syntax = "proto3";

package gizclaw.rpc.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/GizClaw/gizclaw-go/pkgs/gizclaw/api/rpcproto;rpcpb";

message Badge {
  bool active = 1;
  string badge_def_id = 2;
  string created_at = 3;
  int64 exp = 4;
  string id = 5;
  int64 level = 6;
  string owner_public_key = 7;
  int64 progress = 8;
  string updated_at = 9;
}

message BadgeDefPixaDownloadRequest {
  string id = 1;
}

message BadgeDefPixaDownloadResponse {
  string id = 1;
  optional string pixa_path = 2;
  int64 size_bytes = 3;
}

message BadgeListResponse {
  bool has_next = 1;
  repeated Badge items = 2;
  optional string next_cursor = 3;
}

message GameResult {
  string created_at = 1;
  optional string difficulty = 2;
  optional int64 duration_ms = 3;
  string game_def_id = 4;
  string id = 5;
  optional string idempotency_key = 6;
  optional int64 max_score = 7;
  string occurred_at = 8;
  optional string outcome = 9;
  string owner_public_key = 10;
  optional GameplayMetadata payload = 11;
  string pet_id = 12;
  string runtime_profile_name = 13;
  optional int64 score = 14;
}

message GameResultListResponse {
  bool has_next = 1;
  repeated GameResult items = 2;
  optional string next_cursor = 3;
}

message GameRewardSpec {
  reserved 1, 3;
  reserved "ability_delta", "life_delta";

  map<string, int64> badge_exp_delta = 2;
  optional int64 pet_exp_delta = 4;
  optional int64 points_delta = 5;
}

message GameplayGetRequest {
  string id = 1;
}

message GameplayListRequest {
  optional string cursor = 1;
  optional int64 limit = 2;
}

message GameplayMetadata {
  google.protobuf.Struct fields = 1;
}

message Pet {
  reserved 1, 4, 7;
  reserved "ability", "exp", "level";

  string created_at = 2;
  string display_name = 3;
  string id = 5;
  string last_active_at = 6;
  PetLife life = 8;
  string owner_public_key = 9;
  string petdef_id = 10;
  string runtime_profile_name = 11;
  string updated_at = 12;
  reserved 13;
  reserved "workflow_name";
  string workspace_name = 14;
  PetProgression progression = 15;
}

message PetAdoptRequest {
  optional string display_name = 1;
  reserved 2;
  reserved "ruleset_name";
}

message PetAdoptResponse {
  Pet pet = 1;
  PointsAccount points = 2;
  PointsTransaction transaction = 3;
}

message PetPixaDownloadRequest {
  string pet_id = 1;
}

message PetPixaDownloadResponse {
  string pet_id = 1;
  string petdef_id = 2;
  optional string pixa_path = 3;
  int64 size_bytes = 4;
}

message PetActionEffectSpec {
  optional PetLife attr_delta_life = 1;
  optional int64 pet_exp_delta = 2;
}

message PetAction {
  string id = 1;
  int64 cost = 2;
  optional PetActionEffectSpec effect = 3;
  optional string visual_clip_id = 4;
  optional string pixa_clip_name = 5;
}

message PetActionI18nText {
  string name = 1;
}

message PetActionsI18nCatalog {
  map<string, PetActionI18nText> actions = 1;
}

message PetActionsI18n {
  map<string, PetActionsI18nCatalog> value = 1;
}

message PetActions {
  string pet_id = 1;
  string petdef_id = 2;
  string default_locale = 3;
  repeated PetAction actions = 4;
  PetActionsI18n i18n = 5;
  string petdef_updated_at = 6;
  map<string, string> clip_names = 7;
}

message PetDeleteRequest {
  string id = 1;
}

message PetDriveGameResultInput {
  optional string difficulty = 1;
  optional int64 duration_ms = 2;
  string game_def_id = 3;
  optional string idempotency_key = 4;
  optional int64 max_score = 5;
  optional string occurred_at = 6;
  optional string outcome = 7;
  optional GameplayMetadata payload = 8;
  optional int64 score = 9;
}

message PetDriveRequest {
  optional string action = 1;
  optional PetDriveGameResultInput game_result = 2;
  string pet_id = 3;
}

message PetDriveResponse {
  repeated Badge badges = 1;
  optional GameResult game_result = 2;
  Pet pet = 3;
  PointsAccount points = 4;
  repeated RewardGrant reward_grants = 5;
  repeated PointsTransaction transactions = 6;
}

message PetGetRequest {
  string id = 1;
}

message PetListResponse {
  bool has_next = 1;
  repeated Pet items = 2;
  optional string next_cursor = 3;
}

message PetPutRequest {
  string display_name = 1;
  string id = 2;
}

message PointsAccount {
  int64 balance = 1;
  string created_at = 2;
  string owner_public_key = 3;
  string runtime_profile_name = 4;
  string updated_at = 5;
}

message PointsTransaction {
  int64 balance_after = 1;
  string created_at = 2;
  int64 delta = 3;
  optional string game_result_id = 4;
  string id = 5;
  string owner_public_key = 6;
  optional string pet_id = 7;
  string reason = 8;
  optional string reward_grant_id = 9;
  string runtime_profile_name = 10;
  string source_id = 11;
  string source_type = 12;
}

message PointsTransactionListResponse {
  bool has_next = 1;
  repeated PointsTransaction items = 2;
  optional string next_cursor = 3;
}

message RewardGrant {
  reserved 1, 6;
  reserved "ability_delta", "life_delta";

  map<string, int64> badge_exp_delta = 2;
  string created_at = 3;
  optional string game_result_id = 4;
  string id = 5;
  string owner_public_key = 7;
  int64 pet_exp_delta = 8;
  optional string pet_id = 9;
  int64 points_delta = 10;
  optional string reason = 11;
  string runtime_profile_name = 12;
  string source_id = 13;
  string source_type = 14;
}

message RewardGrantListResponse {
  bool has_next = 1;
  repeated RewardGrant items = 2;
  optional string next_cursor = 3;
}

message ServerBadgeGetRequest {
  GameplayGetRequest value = 1;
}

message ServerBadgeGetResponse {
  Badge value = 1;
}

message ServerBadgeListRequest {
  GameplayListRequest value = 1;
}

message ServerBadgeListResponse {
  BadgeListResponse value = 1;
}

message ServerGameResultGetRequest {
  GameplayGetRequest value = 1;
}

message ServerGameResultGetResponse {
  GameResult value = 1;
}

message ServerGameResultListRequest {
  GameplayListRequest value = 1;
}

message ServerGameResultListResponse {
  GameResultListResponse value = 1;
}

message RuntimeAdoptRequest {
  PetAdoptRequest value = 1;
}

message RuntimeAdoptResponse {
  PetAdoptResponse value = 1;
}

message ServerPetDeleteRequest {
  PetDeleteRequest value = 1;
}

message ServerPetDeleteResponse {
  Pet value = 1;
}

message ServerPetDriveRequest {
  PetDriveRequest value = 1;
}

message ServerPetDriveResponse {
  PetDriveResponse value = 1;
}

message ServerPetGetRequest {
  PetGetRequest value = 1;
}

message ServerPetGetResponse {
  Pet value = 1;
}

message ServerPetPixaDownloadRequest {
  PetPixaDownloadRequest value = 1;
}

message ServerPetPixaDownloadResponse {
  PetPixaDownloadResponse value = 1;
}

message ServerPetActionsGetRequest {
  PetGetRequest value = 1;
}

message ServerPetActionsGetResponse {
  PetActions value = 1;
}

message ServerPetListRequest {
  GameplayListRequest value = 1;
}

message ServerPetListResponse {
  PetListResponse value = 1;
}

message ServerPetPutRequest {
  PetPutRequest value = 1;
}

message ServerPetPutResponse {
  Pet value = 1;
}

message ServerPointsGetRequest {
  reserved 1;
  reserved "ruleset_name";
}

message ServerPointsGetResponse {
  PointsAccount value = 1;
}

message ServerPointsTransactionGetRequest {
  GameplayGetRequest value = 1;
}

message ServerPointsTransactionGetResponse {
  PointsTransaction value = 1;
}

message ServerPointsTransactionListRequest {
  GameplayListRequest value = 1;
}

message ServerPointsTransactionListResponse {
  PointsTransactionListResponse value = 1;
}

message ServerRewardGrantGetRequest {
  GameplayGetRequest value = 1;
}

message ServerRewardGrantGetResponse {
  RewardGrant value = 1;
}

message ServerRewardGrantListRequest {
  GameplayListRequest value = 1;
}

message ServerRewardGrantListResponse {
  RewardGrantListResponse value = 1;
}

message PetLife {
  map<string, int64> value = 1;
}

message PetProgression {
  map<string, int64> value = 1;
}
