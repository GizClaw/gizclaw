syntax = "proto3";

package gizclaw.telemetry.v1;

option go_package = "github.com/GizClaw/gizclaw-go/pkgs/gizclaw/api/telemetry;telemetrypb";

message TelemetryFrame {
  uint32 sequence = 1;
  int64 observed_at_unix_ms = 2;
  repeated Observation observations = 3;
}

message Observation {
  int32 observed_at_delta_ms = 1;

  oneof body {
    BatteryObservation battery = 10;
    GnssObservation gnss = 11;
    NetworkObservation network = 12;
    SystemObservation system = 13;
  }
}

message BatteryObservation {
  optional double percent = 1;
  optional bool charging = 2;
  optional double voltage_mv = 3;
}

message GnssObservation {
  double latitude = 1;
  double longitude = 2;
  optional double altitude_m = 3;
  optional double accuracy_m = 4;
}

message NetworkObservation {
  optional double rssi_dbm = 1;
  optional double signal_level = 2;
  optional string rat = 3;
  optional string operator = 4;
  optional bool connected = 5;
}

message SystemObservation {
  optional double uptime_seconds = 1;
  optional double free_memory_bytes = 2;
  optional double temperature_c = 3;
  optional string firmware_version = 4;
  optional string software_version = 5;
  optional string hardware_version = 6;
}
