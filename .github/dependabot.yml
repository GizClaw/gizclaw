version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      codeql-actions:
        patterns:
          - github/codeql-action/*

  - package-ecosystem: gitsubmodule
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: /apps/wails
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: /examples/audio_player
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: /examples/genx
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: /examples/songs
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: /examples/voiceprint
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: /examples/webrtc_sfu
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      workspace-tooling:
        patterns:
          - typescript
          - vite
          - "@vitejs/*"
          - "@hey-api/*"
      workspace-ui:
        patterns:
          - lucide-react
          - react
          - react-dom
          - react-router-dom
          - "@radix-ui/*"
          - radix-ui
      workspace-noble:
        patterns:
          - "@noble/curves"
          - "@noble/hashes"
          - "@noble/ciphers"

  - package-ecosystem: npm
    directory: /tests/gizclaw-e2e/js
    schedule:
      interval: weekly
