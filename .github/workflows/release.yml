name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux-amd64:
    name: Linux amd64 Release Binary
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Ensure Git LFS assets are available
        run: git lfs pull

      - name: Build gizclaw Linux amd64 binary
        run: ./build/build-linux-amd64.sh

      - name: Verify release binary on Ubuntu 24.04
        run: |
          file .tmp/deploy/gizclaw-linux-amd64
          docker run --rm --platform linux/amd64 \
            -v "$PWD/.tmp/deploy:/out:ro" \
            ubuntu:24.04 \
            sh -lc 'ldd /out/gizclaw-linux-amd64 && /out/gizclaw-linux-amd64 --help >/dev/null'

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gizclaw-linux-amd64
          path: .tmp/deploy/gizclaw-linux-amd64
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          asset=".tmp/deploy/gizclaw-linux-amd64"
          asset_name="gizclaw-linux-amd64"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$asset#$asset_name" --clobber
          else
            gh release create "$tag" "$asset#$asset_name" --title "$tag" --generate-notes
          fi
