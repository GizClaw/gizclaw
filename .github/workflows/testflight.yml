name: TestFlight

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: Optional CFBundleVersion; defaults to the workflow run number
        required: false
        type: string

concurrency:
  group: testflight
  cancel-in-progress: false

jobs:
  publish:
    name: Build and upload iOS app
    runs-on: macos-15
    timeout-minutes: 60
    environment: testflight
    permissions:
      contents: read
    env:
      IOS_APP_DIR: apps/gizclaw-app
      IOS_BUNDLE_ID: com.gizclaw.opensource
      IOS_TEAM_ID: D782F5CP4S
      BUILD_NUMBER: ${{ inputs.build_number || github.run_number }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          lfs: true

      - name: Ensure Git LFS assets are available
        run: git lfs pull

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: "3.38.1"
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: ${{ env.IOS_APP_DIR }}
        run: flutter pub get

      - name: Analyze app
        working-directory: ${{ env.IOS_APP_DIR }}
        run: flutter analyze

      - name: Test app
        working-directory: ${{ env.IOS_APP_DIR }}
        run: flutter test

      - name: Install signing material
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          : "${IOS_DISTRIBUTION_CERTIFICATE_BASE64:?missing IOS_DISTRIBUTION_CERTIFICATE_BASE64}"
          : "${IOS_DISTRIBUTION_CERTIFICATE_PASSWORD:?missing IOS_DISTRIBUTION_CERTIFICATE_PASSWORD}"
          : "${IOS_PROVISIONING_PROFILE_BASE64:?missing IOS_PROVISIONING_PROFILE_BASE64}"

          certificate_path="$RUNNER_TEMP/distribution.p12"
          profile_path="$RUNNER_TEMP/app-store.mobileprovision"
          profile_plist="$RUNNER_TEMP/app-store-profile.plist"
          keychain_path="$RUNNER_TEMP/testflight-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          echo "IOS_KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"

          printf '%s' "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 -D > "$certificate_path"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -D > "$profile_path"
          security cms -D -i "$profile_path" > "$profile_plist"

          profile_uuid="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$profile_plist")"
          profile_name="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$profile_plist")"
          profile_team="$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$profile_plist")"
          profile_app_id="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$profile_plist")"
          echo "IOS_PROFILE_NAME=$profile_name" >> "$GITHUB_ENV"
          echo "IOS_PROFILE_UUID=$profile_uuid" >> "$GITHUB_ENV"

          if [[ "$profile_team" != "$IOS_TEAM_ID" ]]; then
            echo "Provisioning profile team does not match IOS_TEAM_ID" >&2
            exit 1
          fi
          if [[ "$profile_app_id" != "$IOS_TEAM_ID.$IOS_BUNDLE_ID" ]]; then
            echo "Provisioning profile application identifier does not match IOS_BUNDLE_ID" >&2
            exit 1
          fi

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          signing_identities="$(security find-identity -v -p codesigning "$keychain_path")"
          if ! grep -q '"Apple Distribution:' <<< "$signing_identities"; then
            echo 'The imported certificate is not a valid Apple Distribution identity' >&2
            exit 1
          fi

          profiles_dir="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$profiles_dir"
          cp "$profile_path" "$profiles_dir/$profile_uuid.mobileprovision"

      - name: Configure App Store export
        run: |
          set -euo pipefail

          export_options="$RUNNER_TEMP/ExportOptions.plist"
          /usr/libexec/PlistBuddy -c 'Add :method string app-store-connect' "$export_options"
          /usr/libexec/PlistBuddy -c 'Add :destination string export' "$export_options"
          /usr/libexec/PlistBuddy -c "Add :teamID string $IOS_TEAM_ID" "$export_options"
          /usr/libexec/PlistBuddy -c 'Add :signingStyle string manual' "$export_options"
          /usr/libexec/PlistBuddy -c 'Add :signingCertificate string Apple Distribution' "$export_options"
          /usr/libexec/PlistBuddy -c 'Add :manageAppVersionAndBuildNumber bool false' "$export_options"
          /usr/libexec/PlistBuddy -c 'Add :stripSwiftSymbols bool true' "$export_options"
          /usr/libexec/PlistBuddy -c 'Add :provisioningProfiles dict' "$export_options"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:$IOS_BUNDLE_ID string $IOS_PROFILE_NAME" "$export_options"
          echo "IOS_EXPORT_OPTIONS=$export_options" >> "$GITHUB_ENV"

      - name: Build signed IPA
        working-directory: ${{ env.IOS_APP_DIR }}
        run: |
          set -euo pipefail

          flutter build ipa \
            --release \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist="$IOS_EXPORT_OPTIONS"

          ipa_path="$(find build/ios/ipa -maxdepth 1 -name '*.ipa' -print -quit)"
          if [[ -z "$ipa_path" ]]; then
            echo 'Flutter did not produce an IPA' >&2
            exit 1
          fi
          echo "IOS_IPA_PATH=$PWD/$ipa_path" >> "$GITHUB_ENV"

      - name: Validate and upload to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail

          : "${APP_STORE_CONNECT_KEY_ID:?missing APP_STORE_CONNECT_KEY_ID}"
          : "${APP_STORE_CONNECT_ISSUER_ID:?missing APP_STORE_CONNECT_ISSUER_ID}"
          : "${APP_STORE_CONNECT_PRIVATE_KEY_BASE64:?missing APP_STORE_CONNECT_PRIVATE_KEY_BASE64}"

          private_keys_dir="$HOME/.appstoreconnect/private_keys"
          private_key_path="$private_keys_dir/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8"
          echo "ASC_PRIVATE_KEY_PATH=$private_key_path" >> "$GITHUB_ENV"
          mkdir -p "$private_keys_dir"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 -D > "$private_key_path"
          chmod 600 "$private_key_path"

          xcrun altool \
            --validate-app \
            --type ios \
            --file "$IOS_IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IOS_IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Summarize upload
        run: |
          {
            echo '### TestFlight upload submitted'
            echo
            echo "- Bundle ID: \`$IOS_BUNDLE_ID\`"
            echo "- Build number: \`$BUILD_NUMBER\`"
            echo '- App Store Connect will process the uploaded build before it appears in TestFlight.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Remove signing material
        if: always()
        run: |
          if [[ -n "${IOS_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$IOS_KEYCHAIN_PATH" || true
          fi
          if [[ -n "${IOS_PROFILE_UUID:-}" ]]; then
            rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/$IOS_PROFILE_UUID.mobileprovision"
          fi
          if [[ -n "${ASC_PRIVATE_KEY_PATH:-}" ]]; then
            rm -f "$ASC_PRIVATE_KEY_PATH"
          fi
          rm -f \
            "$RUNNER_TEMP/distribution.p12" \
            "$RUNNER_TEMP/app-store.mobileprovision" \
            "$RUNNER_TEMP/app-store-profile.plist" \
            "$RUNNER_TEMP/ExportOptions.plist"
