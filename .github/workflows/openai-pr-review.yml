name: OpenAI PR review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Open pull request to review.
        required: true
        type: string

permissions:
  checks: write
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: openai-pr-review-${{ github.event.pull_request.number || github.event.issue.number || inputs.pull_request_number }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      github.actor != 'dependabot[bot]' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    uses: GizClaw/github-workflows/.github/workflows/codex-openai-review.yml@73b65594a0ba26838bf428ce16fb058924d95f4b
    with:
      model: gpt-5.6-terra
      effort: medium
      review-instructions: >-
        Review only the pull-request diff and report actionable correctness,
        security, regression, cross-module contract, and test-coverage findings.
      pull_request_number: ${{ inputs.pull_request_number }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
