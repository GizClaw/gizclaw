name: OpenAI PR review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Open pull request to review.
        required: true
        type: string

permissions:
  checks: write
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: openai-pr-review-${{ github.event.pull_request.number || github.event.issue.number || inputs.pull_request_number }}
  cancel-in-progress: true

jobs:
  authorize:
    permissions:
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.check.outputs.result }}
    steps:
      - id: check
        name: Check whether the pull request is trusted
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          result-encoding: string
          script: |
            if (context.actor === "dependabot[bot]") {
              return "false";
            }

            if (context.eventName === "workflow_dispatch") {
              return "true";
            }

            const repository = `${context.repo.owner}/${context.repo.repo}`;
            if (context.eventName === "pull_request") {
              const pullRequest = context.payload.pull_request;
              return pullRequest.user.login !== "dependabot[bot]" &&
                pullRequest.head.repo.full_name === repository
                  ? "true"
                  : "false";
            }

            if (
              context.eventName === "issue_comment" &&
              context.payload.issue.pull_request
            ) {
              const { data: pullRequest } = await github.rest.pulls.get({
                ...context.repo,
                pull_number: context.issue.number,
              });
              return pullRequest.user?.login !== "dependabot[bot]" &&
                pullRequest.head.repo?.full_name === repository
                  ? "true"
                  : "false";
            }

            return "false";

  review:
    needs: authorize
    if: needs.authorize.outputs.allowed == 'true'
    uses: GizClaw/github-workflows/.github/workflows/codex-openai-review.yml@73b65594a0ba26838bf428ce16fb058924d95f4b
    with:
      model: gpt-5.6-terra
      effort: medium
      review-instructions: >-
        Review only the pull-request diff and report actionable correctness,
        security, regression, cross-module contract, and test-coverage findings.
      pull_request_number: ${{ inputs.pull_request_number }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
