---
apiVersion: gizclaw.admin/v1alpha1
kind: Workflow
metadata: {name: ast-translate-zh-ja}
i18n:
  default_locale: en
  en: {name: Chinese/Japanese Interpreter, description: Translate spoken Chinese and Japanese in real time.}
  zh-CN: {name: 中日语音翻译, description: 实时翻译中文和日语语音。}
spec:
  driver: ast-translate
  ast_translate: {translation_model: volc-ast-translate, mode: s2s, voice: {speaker_id: zh_female_vv_uranus_bigtts}, resource_id: volc.service_type.10053, denoise: false}
