---
apiVersion: gizclaw.admin/v1alpha1
kind: Workflow
metadata: {name: ast-translate-zh-en-auto}
spec:
  driver: ast-translate
  ast_translate:
    translation_model: translation-model
    mode: s2s
    voice: {tts_voice: translator}
    resource_id: volc.service_type.10053
    enable_source_language_detect: true
    denoise: false
