---
apiVersion: gizclaw.admin/v1alpha1
kind: PetDef
metadata:
  name: petdef-hoots
spec:
  workflow_name: pet-care
  attr:
    life:
      wellness: {initial: 100}
      energy: {initial: 100}
    progression:
      xp: {initial: 0}
  character:
    prompt: A round orange owl with large glasses, bright attentive eyes, tiny feet, and a thoughtful bookish personality.
  voice:
    voice_id: cute-pet
    prompt: Thoughtful, warm, concise replies with patient scholarly charm.
  drive:
    actions:
      - {id: idle, cost: 0, visual_clip_id: idle}
      - {id: wave, cost: 2, visual_clip_id: waving, effect: {pet_exp_delta: 2}}
      - id: jump
        cost: 4
        visual_clip_id: jumping
        effect: {attr_delta: {life: {energy: -4}}, pet_exp_delta: 4}
      - id: play
        cost: 5
        visual_clip_id: running
        effect: {attr_delta: {life: {wellness: 5, energy: -5}}, pet_exp_delta: 6}
  visual:
    refs: {images: [], videos: []}
    pixa:
      asset_ref: asset://codex/pets/hoots.pixa
      metadata:
        version: "1"
        canvas: {width: 96, height: 104}
        clips:
          - {id: idle, action_id: idle, pixa_clip_name: idle}
          - {id: running-right, pixa_clip_name: running-right}
          - {id: running-left, pixa_clip_name: running-left}
          - {id: waving, action_id: wave, pixa_clip_name: waving}
          - {id: jumping, action_id: jump, pixa_clip_name: jumping}
          - {id: failed, pixa_clip_name: failed}
          - {id: waiting, pixa_clip_name: waiting}
          - {id: running, action_id: play, pixa_clip_name: running}
          - {id: review, pixa_clip_name: review}
i18n:
  default_locale: en
  en:
    display_name: Hoots
    description: A native Codex animated pet.
    attr:
      life:
        wellness: {display_name: Wellness}
        energy: {display_name: Energy}
      progression:
        xp: {display_name: Experience}
    drive:
      actions:
        idle: {display_name: Rest}
        wave: {display_name: Wave}
        jump: {display_name: Jump}
        play: {display_name: Play}
  zh-CN:
    display_name: Hoots
    description: Codex 原生动画宠物。
    attr:
      life:
        wellness: {display_name: 状态}
        energy: {display_name: 精力}
      progression:
        xp: {display_name: 经验}
    drive:
      actions:
        idle: {display_name: 休息}
        wave: {display_name: 挥手}
        jump: {display_name: 跳跃}
        play: {display_name: 玩耍}
