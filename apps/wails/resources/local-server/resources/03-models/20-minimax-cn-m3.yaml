---
apiVersion: gizclaw.admin/v1alpha1
kind: Model
metadata:
  name: minimax-cn-m3
spec:
  kind: llm
  source: manual
  provider:
    kind: minimax-tenant
    name: minimax-cn
  name: MiniMax M3 CN
  description: MiniMax M3 through the CN chat completions API
  provider_data:
    api_mode: chat_completions
    upstream_model: MiniMax-M3
    support_json_output: false
    support_text_only: true
    support_temperature: true
    support_thinking: false
    support_tool_calls: true
    use_system_role: true
