---
apiVersion: gizclaw.admin/v1alpha1
kind: Model
metadata:
  name: deepseek-v4-pro
spec:
  kind: llm
  source: manual
  provider:
    kind: openai-tenant
    name: deepseek-main
  name: DeepSeek V4 Pro
  description: DeepSeek V4 Pro OpenAI-compatible chat model
  capabilities:
    json_output: true
    system_role: true
    temperature: true
    text_only: true
    tool_calls: true
    thinking:
      supported: true
      param: thinking.type
      levels:
        - enabled
        - disabled
      default_level: enabled
  provider_data:
    upstream_model: deepseek-v4-pro
    support_json_output: true
    support_text_only: true
    support_tool_calls: true
    support_thinking: true
    thinking_param: thinking.type
    thinking_levels:
      - enabled
      - disabled
    default_thinking_level: enabled
    use_system_role: true
