---
apiVersion: gizclaw.admin/v1alpha1
kind: Model
metadata:
  name: deepseek-v4-flash
spec:
  kind: llm
  source: manual
  provider:
    kind: deepseek-tenant
    name: deepseek-main
  name: DeepSeek V4 Flash
  description: DeepSeek V4 Flash OpenAI-compatible chat model
  provider_data:
    api_mode: chat_completions
    upstream_model: deepseek-v4-flash
    support_json_output: true
    support_temperature: true
    support_text_only: true
    support_tool_calls: true
    support_thinking: true
    thinking_param: thinking.type
    thinking_levels:
      - enabled
      - disabled
    default_thinking_level: enabled
    use_system_role: true
